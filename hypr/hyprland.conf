# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-1, 2560x1600@165, 0x0,1  #,preferred,auto,auto
#monitor=HDMI-A-1, 1920x1080@60, -1920x0, 1 #, mirror, eDP-2
monitor=HDMI-A-1, 1920x1080@60, -1920x0, 1 #, mirror, eDP-2
monitor=DP-1, 2560x1440@60, -2560x0, 1 #, mirror, eDP-2


$terminal = alacritty #kitty
$fileManager = thunar
$menu = rofi -show drun -replace -i

# Executes at startup
exec-once = pamixer -m
exec-once = pactl set-source-mute 1 true
# Load Dunst Notification Manager
exec-once = dunst
# Using hypridle to start hyprlock
exec-once = hypridle
# Load cliphist history
exec-once = wl-paste --watch cliphist store
# Initialize waypaper
exec-once = hyprpaper
# Launch Waybar
exec-once = waybar -c .config/waybar/config.jsonc -s .config/waybar/style.css
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
# xdg-desktop-portal-hyprland can get environment variables from systemd
#exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Environment variables
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = ELECTRON_OZONE_PLATFORM_HINT,auto
# Nvidia env vars (aquamarine backend, RTX 5070 on card2/eDP-1)
env = AQ_DRM_DEVICES,/dev/dri/card2
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

input {
    kb_layout = dk
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 2

    touchpad {
        natural_scroll = true
    }

    sensitivity = 0 # -1.0 to 1.0, 0 means no modification.
}

general {
    gaps_in = 3
    gaps_out = 0
    border_size = 0
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

decoration {
    rounding = 0
    
    blur {
        enabled = 0
        size = 3
        passes = 1
    }
    # active_opacity = 1.0
    # inactive_opacity = 0.6
}

animations {
    enabled = 0 #yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    # pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    # new_is_master = true
}

gestures {
    
}

cursor {
    no_hardware_cursors = true
}

misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true
}


# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.

# layerrule = blue, rofi


##########################################
################ Keybinds ################
##########################################

source = ~/.config/hypr/keybinds.conf

