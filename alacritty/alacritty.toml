[font]
size = 12.0

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[window]
opacity = 0.7

[window.padding]
x = 15
y = 15

[selection]
save_to_clipboard = true

[terminal]

[terminal.shell]
program = "/usr/bin/fish"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
